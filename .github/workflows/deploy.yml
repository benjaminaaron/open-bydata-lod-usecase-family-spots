name: Deploy interactive map to GitHub Pages

# Publishes the self-contained interactive map (src/map-interactive.html) as a static
# GitHub Page. The committed HTML already has all data inlined and loads Leaflet from a
# CDN, so there is nothing to build here — we just stage it as index.html and deploy.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage the interactive map as index.html (_site is the action's default dir)
        run: |
          mkdir -p _site
          cp src/map-interactive.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
